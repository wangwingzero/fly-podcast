sources:
  # ============================================================
  # International aviation industry news sources
  # ============================================================
  - id: flightglobal_air_transport_cli
    name: FlightGlobal Air Transport
    url: https://www.flightglobal.com/air-transport
    type: web
    fetch_mode: playwright_cli
    cli_strategy: flightglobal_air_transport_cli
    source_role: primary_industry
    source_tier: A
    region: international
    lang: en
    link_patterns:
      - "flightglobal\\.com/(?!category/|subscribe/|events/|jobs/)[a-zA-Z0-9].+"
    exclude_patterns:
      - "/author/"
      - "/events/"
      - "/jobs/"
      - "/reports/"
      - "/category/"
      - "/subscribe/"
      - "javascript:"
      - "#"
    max_items: 18
    playwright_timeout: 25
    fetch_article_text: false
    enabled: true

  - id: aviation_week_air_transport_cli
    name: Aviation Week Air Transport
    url: https://aviationweek.com/air-transport
    type: web
    fetch_mode: playwright_cli
    cli_strategy: aviation_week_air_transport_cli
    source_role: primary_industry
    source_tier: A
    region: international
    lang: en
    link_patterns:
      - "aviationweek\\.com/air-transport/(?!$)[a-z-]+/[a-z0-9].+"
    exclude_patterns:
      - "/author/"
      - "/events/"
      - "/marketplace/"
      - "javascript:"
      - "#"
    max_items: 18
    playwright_timeout: 25
    fetch_article_text: false
    enabled: true

  - id: simple_flying_cli
    name: Simple Flying Aviation News
    url: https://simpleflying.com/category/aviation-news/
    type: web
    fetch_mode: playwright_cli
    cli_strategy: simple_flying_cli
    source_role: primary_industry
    source_tier: B
    region: international
    lang: en
    link_patterns:
      - "simpleflying\\.com/(?!category/|tag/|author/|seat-maps/|flight-tracker/|about/)[a-zA-Z0-9].+"
    exclude_patterns:
      - "/author/"
      - "/tag/"
      - "/category/"
      - "/seat-maps/"
      - "/flight-tracker/"
      - "/about/"
      - "javascript:"
      - "#"
    max_items: 20
    playwright_timeout: 25
    fetch_article_text: false
  # disabled 2026-05-17 because playwright-cli can't capture the rendered list.
  - id: ch_aviation_cli
    name: ch-aviation News
    url: https://www.ch-aviation.com/news
    type: web
    fetch_mode: playwright_cli
    source_role: primary_industry
    source_tier: A
    region: international
    lang: en
    link_patterns:
      - "ch-aviation\\.com/news/.+"
    exclude_patterns:
      - "/portal/"
      - "/about/"
      - "javascript:"
      - "#"
    max_items: 30
    playwright_timeout: 60
    enabled: false

  # Reuters: anti-bot wall returns 1.5KB blank page to playwright-cli.
  - id: reuters_aerospace_cli
    name: Reuters Aerospace and Defense
    url: https://www.reuters.com/business/aerospace-defense/
    type: web
    fetch_mode: playwright_cli
    source_role: macro_supplement
    source_tier: B
    region: international
    lang: en
    link_patterns:
      - "reuters\\.com/.+"
    max_items: 12
    playwright_timeout: 60
    enabled: false

  # Bloomberg: "Are you a robot?" challenge to all headless browsers.
  - id: bloomberg_airlines_cli
    name: Bloomberg Airlines
    url: https://www.bloomberg.com/industries/airlines
    type: web
    fetch_mode: playwright_cli
    source_role: macro_supplement
    source_tier: B
    region: international
    lang: en
    link_patterns:
      - "bloomberg\\.com/.+"
    max_items: 8
    playwright_timeout: 60
    enabled: false

  # ============================================================
  # Easy-to-scrape RSS feeds (added 2026-05-17 to backfill the 3 disabled
  # playwright_cli sources above)
  # ============================================================
  - id: theaircurrent_rss
    name: The Air Current
    url: https://theaircurrent.com/feed/
    type: rss
    source_role: primary_industry
    source_tier: A
    region: international
    enabled: true

  - id: ainonline_rss
    name: AIN Online
    url: https://www.ainonline.com/rss.xml
    type: rss
    source_role: primary_industry
    source_tier: A
    region: international
    enabled: false

  - id: runway_girl_rss
    name: Runway Girl Network
    url: https://runwaygirlnetwork.com/feed/
    type: rss
    source_role: primary_industry
    source_tier: B
    region: international
    enabled: true

  - id: airline_geeks_rss
    name: AirlineGeeks
    url: https://airlinegeeks.com/feed/
    type: rss
    source_role: primary_industry
    source_tier: B
    region: international
    enabled: true


  - id: airport_technology_rss
    name: Airport Technology
    url: https://www.airport-technology.com/feed/
    type: rss
    source_role: primary_industry
    source_tier: B
    region: international
    enabled: true

  - id: aviation_business_news_rss
    name: Aviation Business News
    url: https://aviationbusinessnews.com/feed/
    type: rss
    source_role: primary_industry
    source_tier: B
    region: international
    enabled: false

  - id: airinsight_rss
    name: AirInsight
    url: https://airinsight.com/feed/
    type: rss
    source_role: primary_industry
    source_tier: B
    region: international
    enabled: true


  # ============================================================
  # Accident / safety exception sources
  # ============================================================
  - id: avherald_web
    name: The Aviation Herald
    url: https://avherald.com/
    type: web
    fetch_mode: requests
    source_role: accident_exception
    source_tier: B
    region: international
    lang: en
    link_patterns:
      - "avherald\\.com/h\\?article="
    published_at_patterns:
      - "on\\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\\s+([0-3]?\\d)(?:st|nd|rd|th)?\\s+(20\\d{2})"
    article_include_keywords: []
    max_items: 80
    enabled: true

  - id: asn_2026_web
    name: Aviation Safety Network 2026
    url: https://asn.flightsafety.org/asndb/year/2026
    type: web
    fetch_mode: requests
    verify_ssl: false
    source_role: accident_exception
    source_tier: B
    region: international
    lang: en
    link_patterns:
      - "aviation-safety\\.net/wikibase/"
      - "asn\\.flightsafety\\.org/wikibase/"
    published_at_patterns: []
    article_include_keywords: []
    max_items: 80
    enabled: true

  - id: flightglobal_safety
    name: FlightGlobal Safety
    url: https://www.flightglobal.com/category/safety/feed/
    type: rss
    source_role: accident_exception
    source_tier: B
    region: international
    enabled: true

  - id: flightglobal_engines
    name: FlightGlobal Engines
    url: https://www.flightglobal.com/category/engines/feed/
    type: rss
    source_role: primary_industry
    source_tier: B
    region: international
    enabled: true

  - id: ntsb_press_web
    name: NTSB Press Releases
    url: https://www.ntsb.gov/news/press-releases/Pages/default.aspx
    type: web
    fetch_mode: requests
    source_role: accident_exception
    source_tier: B
    region: international
    lang: en
    fallback_order: [playwright]
    link_patterns:
      - "ntsb\\.gov/news/press-releases/Pages/.+\\.aspx"
    published_at_patterns:
      - "(?:NR|MA|MR)(20\\d{2})(0[1-9]|1[0-2])([0-3]\\d)"
    exclude_patterns:
      - "/default.aspx"
      - "javascript:"
      - "#"
    article_include_keywords: []
    max_items: 30
    enabled: true

  - id: easa_ad_web
    name: EASA Safety Publications
    url: https://ad.easa.europa.eu/
    type: web
    fetch_mode: requests
    source_role: primary_industry
    source_tier: A
    region: international
    lang: en
    link_patterns:
      - "ad\\.easa\\.europa\\.eu/ad/"
    published_at_patterns:
      - "(20\\d{2})-(0[1-9]|1[0-2])-(0[1-9]|[12]\\d|3[01])"
    article_include_keywords: []
    max_items: 50
    enabled: true

  - id: faa_safo_web
    name: FAA Safety Alerts for Operators
    url: https://www.faa.gov/other_visit/aviation_industry/airline_operators/airline_safety/safo/all_safos
    type: web
    fetch_mode: requests
    source_role: primary_industry
    source_tier: A
    region: international
    lang: en
    link_patterns:
      - "faa\\.gov/.+SAFO\\d+\\.pdf"
    published_at_patterns: []
    article_include_keywords: []
    max_items: 40
    playwright_timeout: 60
    enabled: true

  - id: faa_info_web
    name: FAA Information for Operators
    url: https://www.faa.gov/other_visit/aviation_industry/airline_operators/airline_safety/info/all_infos
    type: web
    fetch_mode: requests
    source_role: primary_industry
    source_tier: A
    region: international
    lang: en
    link_patterns:
      - "faa\\.gov/.+InFO\\d+\\.pdf"
    published_at_patterns: []
    article_include_keywords: []
    max_items: 50
    enabled: true

  - id: nasa_asrs_callback_web
    name: NASA ASRS CALLBACK
    url: https://asrs.arc.nasa.gov/publications/callback.html
    type: web
    fetch_mode: requests
    source_role: accident_exception
    source_tier: B
    region: international
    lang: en
    link_patterns:
      - "asrs\\.arc\\.nasa\\.gov/publications/callback/cb_\\d+\\.html"
    published_at_patterns:
      - "((?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\\s+20\\d{2})"
    article_include_keywords: []
    max_items: 12
    enabled: true

  # ============================================================
  # Secondary pilot-relevant media. Enabled only when they tend to
  # produce operational or technical items; broad airline business
  # feeds stay disabled by default.
  # ============================================================
  - id: ain_online_web
    name: AIN Online - Aviation International News
    url: https://www.ainonline.com/aviation-news/air-transport
    type: web
    fetch_mode: playwright_cli
    source_role: primary_industry
    source_tier: A
    region: international
    lang: en
    fallback_order: [playwright]
    link_patterns:
      - "ainonline\\.com/aviation-news/.+/20\\d{2}-\\d{2}-\\d{2}/.+"
    published_at_patterns:
      - "(20\\d{2})-(0[1-9]|1[0-2])-(0[1-9]|[12]\\d|3[01])"
    exclude_patterns:
      - "/author/"
      - "/tag/"
      - "javascript:"
      - "#"
    article_include_keywords: []
    max_items: 40
    enabled: true

  # ============================================================
  # Industry / novelty sources for pilot-friendly variety
  # （首飞、取证里程碑、复古涂装、罕见航线、特殊任务等）。
  # 启用时配合 hard_reject_keywords / strict_hard_reject_keywords
  # 过滤股价、会员积分、营销软文等噪声。
  # ============================================================
  - id: aerotime
    name: AeroTime Hub
    url: https://www.aerotime.aero/rss
    type: rss
    source_role: primary_industry
    source_tier: C
    region: international
    enabled: true

  - id: aviation_source
    name: Aviation Source News
    url: https://aviationsourcenews.com/feed/
    type: rss
    source_role: primary_industry
    source_tier: C
    region: international
    enabled: true

  - id: flightglobal_news_web
    name: FlightGlobal Air Transport
    url: https://www.flightglobal.com/category/air-transport/feed/
    type: rss
    source_role: primary_industry
    source_tier: B
    region: international
    enabled: true

  - id: flightradar24_blog
    name: Flightradar24 Blog
    url: https://www.flightradar24.com/blog/feed/
    type: rss
    source_role: primary_industry
    source_tier: C
    region: international
    enabled: true

  - id: iata_press_web
    name: IATA Pressroom Web
    url: https://www.iata.org/en/pressroom/
    type: web
    fetch_mode: requests
    source_role: primary_industry
    source_tier: C
    region: international
    lang: en
    enabled: false

  - id: airbus_newsroom_web
    name: Airbus Newsroom Web
    url: https://www.airbus.com/en/newsroom
    type: web
    fetch_mode: requests
    source_role: corporate_newsroom
    source_tier: C
    region: international
    lang: en
    enabled: false

  - id: boeing_newsroom_web
    name: Boeing Newsroom Web
    url: https://boeing.mediaroom.com/news-releases-statements
    type: web
    fetch_mode: requests
    source_role: corporate_newsroom
    source_tier: C
    region: international
    lang: en
    enabled: false

  - id: delta_news
    name: Delta News Hub
    url: https://news.delta.com/rss.xml
    type: rss
    source_role: corporate_newsroom
    source_tier: C
    region: international
    enabled: false
