sources:
  # ============================================================
  # Pilot-first safety and operations sources
  # ============================================================
  - id: avherald_web
    name: The Aviation Herald
    url: https://avherald.com/
    type: web
    fetch_mode: requests
    source_tier: A
    region: international
    lang: en
    link_patterns:
      - "avherald\\.com/h\\?article="
    published_at_patterns:
      - "on\\s+(Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\\s+([0-3]?\\d)(?:st|nd|rd|th)?\\s+(20\\d{2})"
    article_include_keywords: []
    max_items: 80
    enabled: true

  - id: asn_2026_web
    name: Aviation Safety Network 2026
    url: https://asn.flightsafety.org/asndb/year/2026
    type: web
    fetch_mode: requests
    verify_ssl: false
    source_tier: A
    region: international
    lang: en
    link_patterns:
      - "aviation-safety\\.net/wikibase/"
      - "asn\\.flightsafety\\.org/wikibase/"
    published_at_patterns: []
    article_include_keywords: []
    max_items: 80
    enabled: true

  - id: flightglobal_safety
    name: FlightGlobal Safety
    url: https://www.flightglobal.com/category/safety/feed/
    type: rss
    source_tier: B
    region: international
    enabled: true

  - id: flightglobal_engines
    name: FlightGlobal Engines
    url: https://www.flightglobal.com/category/engines/feed/
    type: rss
    source_tier: B
    region: international
    enabled: true

  - id: ntsb_press_web
    name: NTSB Press Releases
    url: https://www.ntsb.gov/news/press-releases/Pages/default.aspx
    type: web
    fetch_mode: requests
    source_tier: A
    region: international
    lang: en
    fallback_order: [playwright]
    link_patterns:
      - "ntsb\\.gov/news/press-releases/Pages/.+\\.aspx"
    published_at_patterns:
      - "(?:NR|MA|MR)(20\\d{2})(0[1-9]|1[0-2])([0-3]\\d)"
    exclude_patterns:
      - "/default.aspx"
      - "javascript:"
      - "#"
    article_include_keywords: []
    max_items: 30
    enabled: true

  - id: easa_ad_web
    name: EASA Safety Publications
    url: https://ad.easa.europa.eu/
    type: web
    fetch_mode: requests
    source_tier: A
    region: international
    lang: en
    link_patterns:
      - "ad\\.easa\\.europa\\.eu/ad/"
    published_at_patterns:
      - "(20\\d{2})-(0[1-9]|1[0-2])-(0[1-9]|[12]\\d|3[01])"
    article_include_keywords: []
    max_items: 50
    enabled: true

  - id: faa_safo_web
    name: FAA Safety Alerts for Operators
    url: https://www.faa.gov/other_visit/aviation_industry/airline_operators/airline_safety/safo/all_safos
    type: web
    fetch_mode: requests
    source_tier: A
    region: international
    lang: en
    link_patterns:
      - "faa\\.gov/.+SAFO\\d+\\.pdf"
    published_at_patterns: []
    article_include_keywords: []
    max_items: 40
    enabled: true

  - id: faa_info_web
    name: FAA Information for Operators
    url: https://www.faa.gov/other_visit/aviation_industry/airline_operators/airline_safety/info/all_infos
    type: web
    fetch_mode: requests
    source_tier: A
    region: international
    lang: en
    link_patterns:
      - "faa\\.gov/.+InFO\\d+\\.pdf"
    published_at_patterns: []
    article_include_keywords: []
    max_items: 50
    enabled: true

  - id: nasa_asrs_callback_web
    name: NASA ASRS CALLBACK
    url: https://asrs.arc.nasa.gov/publications/callback.html
    type: web
    fetch_mode: requests
    source_tier: A
    region: international
    lang: en
    link_patterns:
      - "asrs\\.arc\\.nasa\\.gov/publications/callback/cb_\\d+\\.html"
    published_at_patterns:
      - "((?:Jan|Feb|Mar|Apr|May|Jun|Jul|Aug|Sep|Oct|Nov|Dec)[a-z]*\\s+20\\d{2})"
    article_include_keywords: []
    max_items: 12
    enabled: true

  # ============================================================
  # Secondary pilot-relevant media. Enabled only when they tend to
  # produce operational or technical items; broad airline business
  # feeds stay disabled by default.
  # ============================================================
  - id: ain_online_web
    name: AIN Online - Aviation International News
    url: https://www.ainonline.com/aviation-news/air-transport
    type: web
    fetch_mode: requests
    source_tier: B
    region: international
    lang: en
    fallback_order: [playwright]
    link_patterns:
      - "ainonline\\.com/aviation-news/.+/20\\d{2}-\\d{2}-\\d{2}/.+"
    published_at_patterns:
      - "(20\\d{2})-(0[1-9]|1[0-2])-(0[1-9]|[12]\\d|3[01])"
    exclude_patterns:
      - "/author/"
      - "/tag/"
      - "javascript:"
      - "#"
    article_include_keywords: []
    max_items: 40
    enabled: true

  # ============================================================
  # Disabled background/business sources kept for manual fallback.
  # They are useful for industry context but are not pilot-first.
  # ============================================================
  - id: aerotime
    name: AeroTime Hub
    url: https://www.aerotime.aero/rss
    type: rss
    source_tier: C
    region: international
    enabled: false

  - id: aviation_source
    name: Aviation Source News
    url: https://aviationsourcenews.com/feed/
    type: rss
    source_tier: C
    region: international
    enabled: false

  - id: flightglobal_news_web
    name: FlightGlobal Air Transport
    url: https://www.flightglobal.com/category/air-transport/feed/
    type: rss
    source_tier: C
    region: international
    enabled: false

  - id: flightradar24_blog
    name: Flightradar24 Blog
    url: https://www.flightradar24.com/blog/feed/
    type: rss
    source_tier: C
    region: international
    enabled: false

  - id: iata_press_web
    name: IATA Pressroom Web
    url: https://www.iata.org/en/pressroom/
    type: web
    fetch_mode: requests
    source_tier: C
    region: international
    lang: en
    enabled: false

  - id: airbus_newsroom_web
    name: Airbus Newsroom Web
    url: https://www.airbus.com/en/newsroom
    type: web
    fetch_mode: requests
    source_tier: C
    region: international
    lang: en
    enabled: false

  - id: boeing_newsroom_web
    name: Boeing Newsroom Web
    url: https://boeing.mediaroom.com/news-releases-statements
    type: web
    fetch_mode: requests
    source_tier: C
    region: international
    lang: en
    enabled: false

  - id: delta_news
    name: Delta News Hub
    url: https://news.delta.com/rss.xml
    type: rss
    source_tier: C
    region: international
    enabled: false
