<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 375 60" style="width:100%;max-width:420px;display:block;margin:0 auto;"><animate attributeName="viewBox" from="0 0 375 60" to="0 0 375 580" dur="0.3s" begin="expand_cover.click" fill="freeze"/><animate attributeName="viewBox" from="0 0 375 580" to="0 0 375 60" dur="0.3s" begin="collapse_btn.click" fill="freeze"/><foreignObject x="0" y="0" width="375" height="520"><section xmlns="http://www.w3.org/1999/xhtml"><section style="margin:0 auto;width:100%;max-width:420px;height:520px;overflow:hidden;border-radius:0 0 12px 12px;border:1px solid #e5e7eb;border-top:none;box-shadow:0 2px 12px rgba(0,0,0,0.06);background:#ffffff;position:relative;"><section style="background:linear-gradient(135deg,#f5f3ff,#ede9fe);padding:14px 16px;color:#5b21b6;font-size:15px;font-weight:600;text-align:center;letter-spacing:0.5px;border-bottom:1px solid #ddd6fe;">ebt来了：循证训练到底训练了个啥？</section><section style="text-align:center;font-size:11px;color:#9ca3af;padding:8px 0 4px 0;">上下滑动查看完整对话 ↕</section><section style="height:430px;overflow-y:scroll;-webkit-overflow-scrolling:touch;padding:8px 14px 24px 14px;background:#fafafa;">
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">欢迎来到飞行播客！我是千羽。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">我是虎机长。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">虎哥，最近我们公司群里天天在转一个文件，什么ac一二一fs一三八r二，搞得跟谍战片接头暗号似的。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">哈哈，这不是暗号，这是民航局今年二月刚发的ebt实施管理规定，第二次修订版。三月一号正式生效。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">ebt，循证训练。说实话虎哥，这三个字我听了好几年了，但总感觉像雾里看花，今天能不能给大伙儿掰扯清楚？</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">行，今天咱就聊聊这个。从为什么要搞ebt，到它怎么训、怎么考、怎么管人，一次讲透。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">虎哥，我先问个灵魂问题——咱以前的复训模式用了这么多年，也没出什么大问题啊，为啥非要折腾ebt？</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">千羽你想啊，传统训练是基于任务的，规定时间内完成指定科目，模拟机里飞得漂漂亮亮的，但到了航线上呢？</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">到了航线上……天气乱、管制催、乘务员敲门、机长还在跟签派吵架，完全不是一回事儿。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">对，这就是问题。传统训练追求的是完美表现，但ebt追求的是你出了错之后能不能自己纠回来。这叫从差错概念转向差错管理。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">哦——就是说以前考试追求零失误，现在是允许你犯错，但你得能兜住。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">没错。打个比方，以前是驾校考试，压线就挂。现在是真实路况，旁边有人加塞你得会应对，而不是假装路上只有你一辆车。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">这比喻绝了。那ebt的核心到底是什么？</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">三个关键词：胜任力框架、成人学习原理、数据驱动。简单说就是——练什么有依据，怎么练有方法，练完了有数据反馈，形成闭环。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">说到这个我想起来，文件里反复提到一个词叫plm，飞行员技能全生命周期管理。虎哥，这跟ebt啥关系？</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">千羽，你可以这么理解——plm是那个大房子，ebt是房子里最重要的一根柱子。plm管的是飞行员从学员到检查员整个职业生涯的能力建设。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">从ab-initio到dpe，全覆盖？</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">对。而且plm提出了一个很有中国特色的东西——岗位胜任力有三个支点：核心胜任力、作风胜任力、心理胜任力。国际上只搞了核心胜任力，后面两个是咱们自己加的。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">作风胜任力……虎哥你是说那种&#x27;不管规定怎么写我都按自己习惯飞&#x27;的问题？</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">哈哈，你这例子举得太精准了，我不点评。总之ebt现在聚焦的是九项核心胜任力，任意三年的目标胜任力要全覆盖这九项。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">九项全覆盖，这就不是应付考试了，是真的在系统性地补短板。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">虎哥，最实际的问题来了——ebt的模拟机课到底怎么上？跟以前有啥不一样？</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">以前是上来就飞科目对吧？ebt把模拟机分成四个阶段：loe基于航线的评估、mv机动检查、sbt基于场景的训练、mt机动训练。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">四个阶段？感觉比以前复杂了啊。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">其实逻辑很清晰。第一天先评估你、再检查你，第二三天再针对你的短板练你。就好比先体检，再开药方，最后治疗。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">那loe阶段具体怎么评估？</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">场景设计贴近真实航线，第一个场景从正常的飞行前设置开始，给你完整的飞行计划，让你进入状态。检查员观察你的胜任力表现，找出你的关键胜任力——说白了就是你的短板。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">然后第二三天就专门练这个短板？</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">对，sbt阶段教员可以根据你暴露的问题选场景，还有isi在座教学，手把手带你练。mt阶段就是纯技术操纵，比如复杂状态改出这些硬功夫。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">我觉得这个思路挺好的，以前是大锅饭，现在是私人订制。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">千羽总结得到位。而且训练主题也不是拍脑袋定的，是按照ebt数据报告分析出来的，分a、b、c三类，频次都有明确要求。a类每半年必须覆盖，c类三年一轮。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">数据驱动，不是领导驱动，这我服。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">对了虎哥，我发现这个文件花了巨大篇幅在讲人员管理，什么cd、ti、sc、lsc、ii、ie，一堆缩写看得我头晕。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">哈哈，确实角色多。但你想啊，ebt对教员的要求比传统训练高得多，因为教员不再是照本宣科念科目了，得会观察、会评估、会引导式讲评。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">引导式讲评是什么意思？不是以前那种&#x27;你这个动作不对，下次注意&#x27;？</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">完全不是。引导式讲评是让学员自己复盘，教员通过提问引导他发现问题。这是成人学习原理——你自己想明白的事儿，比别人告诉你的记得牢十倍。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">所以ebt教员自己得先脱胎换骨。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">没错。ebt教员要先过五天三十小时的理论培训，再上模拟机实操，还得通过教学能力评估。而且资格三十六个月就到期，每年还得参加标准化复训。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">三十六个月一轮，每年还有标准化复训和一致性训练……虎哥，这比我们飞行员的复训还勤快啊。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">千羽，教员标准化是ebt成败的关键。你想想，如果十个教员评分标准不一样，那数据还有什么意义？所以文件专门强调了教员一致性训练。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">懂了，教员不一致，整个体系就垮了。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">虎哥，最后给大家总结一下？</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-end;"><span style="background:linear-gradient(135deg,#22d3ee,#0891b2);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">虎机长</span><section style="background:#ecfeff;border:1px solid #cffafe;padding:11px 14px;border-radius:16px 2px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">一句话：ebt的本质就是用数据说话、用胜任力框架兜底、用标准化教员来执行，让每次复训都真正练到你需要练的东西，而不是年年重复走过场。这个文件三月一号生效，建议大家认真读一读，尤其是附件d的胜任力框架和附件g的熟练检查合规性检查单。</section></section>
<section style="margin-bottom:16px;display:flex;flex-direction:column;align-items:flex-start;"><span style="background:linear-gradient(135deg,#a78bfa,#8b5cf6);color:#fff;padding:3px 10px;border-radius:10px;font-size:11px;font-weight:600;margin-bottom:5px;letter-spacing:0.5px;">千羽</span><section style="background:#faf5ff;border:1px solid #ede9fe;padding:11px 14px;border-radius:2px 16px 16px 16px;font-size:14.5px;line-height:1.75;color:#1f2937;max-width:85%;box-shadow:0 1px 2px rgba(0,0,0,0.03);">感谢收听本期飞行播客。祝大家起降安妥。我们下次云端再会。</section></section>
